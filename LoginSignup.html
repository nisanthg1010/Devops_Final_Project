<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Signup</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f4f4f9;
    }
    .container {
      background-color: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      width: 300px;
    }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #007bff;
      border: none;
      border-radius: 4px;
      color: white;
      font-size: 16px;
    }
    h2 {
      text-align: center;
    }
    .toggle-link {
      display: block;
      text-align: center;
      margin-top: 10px;
      color: #007bff;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container" id="login-container">
  <h2>Login</h2>
  <form id="loginForm" action="http://localhost:5000/auth/login" method="POST">
    <input type="email" name="email" id="email" placeholder="Email" required>
    <input type="password" name="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
  <a class="toggle-link" id="show-signup">Don't have an account? Sign up</a>
</div>

<div class="container" id="signup-container" style="display: none;">
  <h2>Signup</h2>
  <form id="signupForm" action="http://localhost:5000/auth/signup" method="POST">
    <input type="text" name="username" id="username" placeholder="Username" required>
    <input type="email" name="email" id="signup-email" placeholder="Email" required>
    <input type="password" name="password" id="signup-password" placeholder="Password" required>
    <button type="submit">Sign Up</button>
  </form>
  <a class="toggle-link" id="show-login">Already have an account? Login</a>
</div>

<script>
  // Toggle between Login and Signup forms
  document.getElementById('show-signup').addEventListener('click', function() {
    document.getElementById('login-container').style.display = 'none';
    document.getElementById('signup-container').style.display = 'block';
  });
  
  document.getElementById('show-login').addEventListener('click', function() {
    document.getElementById('signup-container').style.display = 'none';
    document.getElementById('login-container').style.display = 'block';
  });

  // Login form submission
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();  // Prevent default form submission
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    fetch('http://localhost:5000/auth/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ email, password })
    })
    .then(response => response.json())
    .then(data => {
      if (data.token) {
        alert('Login successful');
        // Store JWT token or navigate to another page
      } else {
        alert('Login failed');
      }
    })
    .catch(err => {
      alert('Error: ' + err);
    });
  });

  // Signup form submission
  document.getElementById('signupForm').addEventListener('submit', function(e) {
    e.preventDefault();  // Prevent default form submission
    const username = document.getElementById('username').value;
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;

    fetch('http://localhost:5000/auth/signup', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ username, email, password })
    })
    .then(response => response.json())
    .then(data => {
      if (data.message) {
        alert('Signup successful');
        // Navigate to login page after successful signup
        document.getElementById('signup-container').style.display = 'none';
        document.getElementById('login-container').style.display = 'block';
      } else {
        alert('Signup failed');
      }
    })
    .catch(err => {
      alert('Error: ' + err);
    });
  });
</script>

</body>
</html>
